<section class="section-card">
  <p class="section-label">Over het project</p>
  <h2 class="section-title">Snel een Programmeer-project opzetten in VS Code</h2>
  <p class="section-body">
    Hallo Wereld is een VS Code extensie die je in één klik een volledig
    Programmeer-project laat aanmaken — inclusief virtuele omgeving, aanbevolen
    extensies en een startbestand.
  </p>
  <div class="badge-row">
    <span class="badge" *ngFor="let badge of badges">
      <i class="ti {{ badge.icon }}" aria-hidden="true"></i>
      {{ badge.label }}
    </span>
  </div>
</section>
